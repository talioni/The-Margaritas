services:
  trash-api:
    build: ./imageRec
    image: trash-api
    container_name: trash-api
    restart: unless-stopped
    # Pass the USB webcam into the container. If your camera is not video0,
    # change both sides and set CAMERA_INDEX accordingly.
    devices:
      - "/dev/video0:/dev/video0"
    # Let the container user open the video device without running privileged.
    # If this still fails, replace "video" with the host GID from
    #   getent group video
    group_add:
      - "video"
    environment:
      MODEL_PATH: /app/model/best.pt
      CAMERA_INDEX: "0"
    # Local only: reachable from the Pi host (127.0.0.1), never the LAN.
    # hadrware-ctrl reaches it over the docker network as http://trash-api:8000
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - trashnet
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  hadrware-ctrl:
    build: ./hadrwareCtrl
    image: hadrware-ctrl
    container_name: hadrware-ctrl
    restart: unless-stopped
    depends_on:
      trash-api:
        condition: service_healthy
    # GPIO access on Pi 5: pass through the gpiochip char devices so
    # gpiozero/lgpio inside the container can drive the servo.
    devices:
      - "/dev/gpiochip0:/dev/gpiochip0"
      - "/dev/gpiochip4:/dev/gpiochip4"
    # Let the container user open the GPIO devices without running privileged.
    # If this fails, replace "gpio" with the host GID from
    #   getent group gpio
    group_add:
      - "986"
    environment:
      IMAGE_REC_URL: "http://trash-api:8000"
    networks:
      - trashnet

networks:
  trashnet:
    driver: bridge
